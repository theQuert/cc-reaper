# proc-janitor configuration for Claude Code
# Install location: ~/.config/proc-janitor/config.toml
# Documentation: https://github.com/jhlee0409/proc-janitor
#
# Requires: brew install jhlee0409/tap/proc-janitor

# ─── Scan Settings ───────────────────────────────────────────────────────────

# How often the daemon scans for orphaned processes (seconds, 1-3600)
scan_interval = 30

# Time to wait before killing a newly detected orphan (seconds, 0-3600)
# Set higher than scan_interval to avoid false positives during normal subagent work.
grace_period = 60

# Time to wait after SIGTERM before sending SIGKILL (seconds, 1-60)
sigterm_timeout = 5

# ─── Target Patterns ────────────────────────────────────────────────────────
# Only orphaned processes (PPID=1) matching these patterns will be cleaned.

targets = [
    "claude.*stream-json",
    "npm exec @upstash",
    "npm exec mcp-",
    "npx.*mcp-server",
    "node.*sequential-thinking",
    "worker-service.cjs.*--daemon",
    "bun.*worker-service",
    "agent-browser-darwin-arm64",
    "Google Chrome for Testing.*agent-browser-chrome-",
    "puppeteer_dev_chrome_profile-",
    "node /usr/local/bin/codex",
    "@openai/codex.*/codex/codex",
]

# ─── Whitelist Patterns ─────────────────────────────────────────────────────
# Processes that should NEVER be killed, even if they match a target.

whitelist = [
    "node.*(dev-server|http-server|next.*server)",
    "pm2",
    "npm exec @supabase",
    "npm exec @stripe",
    "context7-mcp",
    "claude-mem.*mcp-server",
    "chroma-mcp",
    "chrome-devtools-mcp",
    "mcp-remote",
    "codex app-server",
    "app-server-broker",
    "ChatGPT.app",
    "cmux.app",
    "Bitdefender",
    "mdworker",
    "mds_stores",
]

# ─── Logging ─────────────────────────────────────────────────────────────────

[logging]
enabled = true
# NOTE: Replace ~ with your actual home directory path after copying
path = "~/.proc-janitor/logs"
retention_days = 7
